<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        width: 100%;
        height: 100dvh;
        box-sizing: border-box;
        font-family: sans-serif;
        color: white;
        padding: 0;
        margin: 0;
      }
      h1 {
        font-size: 10em;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <h1>🚁</h1>
    <script>
      const audio = new Audio("scream.m4a");
      document.querySelector("h1").addEventListener("click", () => {
        if (audio.paused) {
          audio.currentTime = 0;
          audio.play();
        } else {
          audio.pause();
        }
      });
    </script>
  </body>
</html>
