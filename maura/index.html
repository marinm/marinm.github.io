<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        width: 100%;
        height: 100dvh;
        box-sizing: border-box;
        font-family: sans-serif;
        color: white;
        padding: 0;
        margin: 0;
      }
      h1 {
        font-size: 10em;
        cursor: default;
        transition: all 1s;
      }
      .loading {
        filter: grayscale();
      }
    </style>
  </head>
  <body>
    <h1 class="loading">🚁</h1>
    <script>
      const h1 = document.querySelector("h1");
      const audio = new Audio("scream.m4a");

      audio.addEventListener("canplaythrough", () => {
        h1.classList.remove("loading");
      });

      h1.addEventListener("click", () => {
        if (audio.readyState !== HTMLMediaElement.HAVE_ENOUGH_DATA) {
          return;
        }
        if (audio.paused) {
          audio.currentTime = 0;
          audio.play();
        } else {
          audio.pause();
        }
      });
    </script>
  </body>
</html>
